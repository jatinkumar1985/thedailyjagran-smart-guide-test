steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/dev-project-khojle/stg-khojle-blogs-frntd-repo/stg-khojle-blogs-frntd:latest', '.']

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/dev-project-khojle/stg-khojle-blogs-frntd-repo/stg-khojle-blogs-frntd:latest']

  # Deploy the container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'stg-khojle-blogs-frntd',
      '--image', 'asia-south1-docker.pkg.dev/dev-project-khojle/stg-khojle-blogs-frntd-repo/stg-khojle-blogs-frntd:latest',
      '--region', 'asia-south1',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

images:
  - 'asia-south1-docker.pkg.dev/dev-project-khojle/stg-khojle-blogs-frntd-repo/stg-khojle-blogs-frntd:latest'

options:
  logging: CLOUD_LOGGING_ONLY

